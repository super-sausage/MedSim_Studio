# ============================================================
# MedSim Studio - Docker Compose Configuration
# ============================================================
# Standard local stack: frontend, backend, postgres, and minio.
# Keep behavior equivalent while making config easier to maintain.
# ============================================================

x-backend-env: &backend-env
  BACKEND_DEBUG: ${BACKEND_DEBUG:-false}
  POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  POSTGRES_DB: ${POSTGRES_DB:-ct_simulator}
  POSTGRES_USER: ${POSTGRES_USER:-ctuser}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ctpass123}
  MINIO_HOST: ${MINIO_HOST:-minio}
  MINIO_PORT: ${MINIO_PORT:-9000}
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
  MINIO_BUCKET: ${MINIO_BUCKET:-dicom-studies}
  DATABASE_URL: ${DATABASE_URL:-postgresql://ctuser:ctpass123@postgres:5432/ct_simulator}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  AI_DEVICE: ${AI_DEVICE:-cuda}
  AI_MODEL_PATH: ${AI_MODEL_PATH:-/app/custom-models}
  TOTALSEGMENTATOR_DIR: ${TOTALSEGMENTATOR_DIR:-/app/models/totalsegmentator}
  TOTALSEGMENTATOR_FAST: ${TOTALSEGMENTATOR_FAST:-false}
  MEDSIM_PROJECT_ROOT: ${MEDSIM_PROJECT_ROOT:-/app}

x-build-args: &build-args
  APT_MIRROR: ${APT_MIRROR:-}
  PIP_INDEX_URL: ${PIP_INDEX_URL:-}
  PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - ct-network

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-}
        VITE_API_BASE_URL: /api/v1
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    <<: *service-defaults

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      args: *build-args
    ports:
      - "8000:8000"
    environment: *backend-env
    volumes:
      - backend_uploads:/tmp/uploads
      - backend_models:/app/ai-models
      - backend_dicom:/app/static/dicom
      - ./models/totalsegmentator:/app/models/totalsegmentator
      - ./models/nnunet701_full_handoff/nnunet_handoff/model/Dataset701_TotalSegOrgans6/nnUNetTrainer__nnUNetPlans__3d_fullres:/app/models/nnunet_handoff
      - ./models/nnunet702_handoff:/app/models/nnunet702_handoff
      - ./models/nnunet_lung_lobe:/app/models/nnunet_lung_lobe
      - ./models/phantom_atlas:/app/models/phantom_atlas
      - ./data/lung_lobe_samples:/app/data/lung_lobe_samples:ro
    shm_size: 8g
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    <<: *service-defaults

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ct_simulator}
      POSTGRES_USER: ${POSTGRES_USER:-ctuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ctpass123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ctuser} -d ${POSTGRES_DB:-ct_simulator}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    <<: *service-defaults

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    <<: *service-defaults

networks:
  ct-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  backend_uploads:
  backend_models:
  backend_dicom:
